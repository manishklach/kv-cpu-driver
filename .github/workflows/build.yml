name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.10
    steps:
      - name: Show workflow revision
        shell: bash
        run: |
          echo "github.sha=${{ github.sha }}"
          bash --version | head -n 1

      - name: Point apt at Ubuntu old-releases
        shell: bash
        run: |
          for path in /etc/apt/sources.list /etc/apt/sources.list.d/*; do
            [ -f "$path" ] || continue
            sed -i 's|http://archive.ubuntu.com/ubuntu|http://old-releases.ubuntu.com/ubuntu|g' "$path"
            sed -i 's|http://security.ubuntu.com/ubuntu|http://old-releases.ubuntu.com/ubuntu|g' "$path"
            sed -i 's|https://archive.ubuntu.com/ubuntu|http://old-releases.ubuntu.com/ubuntu|g' "$path"
            sed -i 's|https://security.ubuntu.com/ubuntu|http://old-releases.ubuntu.com/ubuntu|g' "$path"
          done
          grep -R "^URIs:\\|^deb " /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null || true

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            git \
            linux-headers-generic

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux 6.11 headers
        run: |
          HEADER_PKG="$(apt-cache search '^linux-headers-6\.11\.0-.*generic$' | awk 'NR==1 {print $1}')"
          if [ -z "$HEADER_PKG" ]; then
            echo "No linux-headers-6.11.0-* package found" >&2
            exit 1
          fi
          apt-get install -y "$HEADER_PKG"
          echo "HEADER_PKG=$HEADER_PKG" >> "$GITHUB_ENV"
          echo "KDIR=/usr/src/$HEADER_PKG" >> "$GITHUB_ENV"

      - name: Build kernel module
        run: make KDIR="$KDIR" CONFIG_KV_CPU=m

      - name: Build kvctl
        run: gcc tools/kvctl.c -I include/uapi -o kvctl

      - name: Smoke-check kvctl usage path
        shell: bash
        run: |
          set +e
          ./kvctl
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "kvctl unexpectedly succeeded without arguments" >&2
            exit 1
          fi
          if [ "$status" -ne 1 ]; then
            echo "kvctl exited with $status, expected 1" >&2
            exit 1
          fi
